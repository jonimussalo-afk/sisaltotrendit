name: Collect Content Marketing Trends

on:
  schedule:
    # 03:00 UTC = 06:00 EET (kesä) / 05:00 EET (talvi)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Syy manuaaliselle ajolle"
        required: false
        default: "manuaalinen testi"

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run collector
        run: python scripts/collect_trends.py

      - name: Commit and push (jos muutoksia)
        run: |
          git config user.name  "trend-bot[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add user/trend-tracker/trends.md
          if git diff --staged --quiet; then
            echo "Ei muutoksia — ei commitia."
          else
            git commit -m "chore: trendit $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi
